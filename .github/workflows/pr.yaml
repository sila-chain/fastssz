name: Unit tests
on: [pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    name: Go test
    steps:
      - uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate spec
        run: ./scripts/ci-validate-specs.sh
      - name: Download spec tests
        run: make get-spec-tests
      - name: Unit tests
        run: go test -v ./...
